<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Not Found</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0b0f14;
      color: #fff;
    }
    .box {
      max-width: 720px;
      padding: 32px;
      line-height: 1.5;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0 0 10px;
      opacity: 0.9;
    }
    code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
    a {
      color: #7db7ff;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Page not found</h1>
    <p>The requested path does not exist.</p>
    <p id="msg"></p>
    <p><a href="/docs/">Go back to Docs</a></p>
  </div>

  <script>
    (function () {
      const path = window.location.pathname;
      const search = window.location.search || "";
      const hash = window.location.hash || "";

      // Never rewrite real static files that should be served directly.
      const protectedPaths = [
        "/docs/sitemap.xml",
        "/docs/robots.txt",
        "/sitemap.xml",
        "/robots.txt"
      ];

      const staticExt = /\.(xml|txt|json|js|css|png|jpg|jpeg|gif|webp|svg|ico|map|pdf)$/i;

      if (protectedPaths.includes(path) || staticExt.test(path)) {
        document.getElementById("msg").innerHTML =
          "This URL is reserved for a static file, so it will not be redirected.";
        return;
      }

      // Convert pretty-path requests into your existing query-string route.
      // Examples:
      // /docs/README.md -> /docs/?file=README.md
      // /docs/docs/overview/QUICK_START.md -> /docs/?file=docs/overview/QUICK_START.md
      const base = "/docs/";
      let file = "";

      if (path.startsWith(base)) {
        file = path.slice(base.length);
      } else {
        file = path.replace(/^\/+/, "");
      }

      if (!file) {
        window.location.replace("/docs/");
        return;
      }

      const target = "/docs/?file=" + encodeURIComponent(file) + search + hash;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
